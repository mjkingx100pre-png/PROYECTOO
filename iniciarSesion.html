<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Cuenta | Urban Style</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#f5f5f5;
}

.contenedor{
    max-width:900px;
    margin:50px auto;
    background:#fff;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

.tabs{
    display:flex;
}

.tab{
    width:50%;
    text-align:center;
    padding:20px;
    font-weight:bold;
    border:1px solid #ddd;
    background:#f8f8f8;
}

.activo{
    background:#fff;
    border-bottom:none;
}

.formularios{
    display:flex;
    flex-wrap:wrap;
    padding:40px;
    gap:40px;
}

.formulario{
    flex:1;
    min-width:300px;
}

.formulario h2{
    margin-bottom:25px;
    color:#222;
}

label{
    display:block;
    margin-bottom:8px;
    color:#555;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    margin-bottom:20px;
    font-size:15px;
}

button{
    width:100%;
    padding:15px;
    background:#e63946;
    color:#fff;
    border:none;
    cursor:pointer;
    font-size:18px;
    font-weight:bold;
    transition:.3s;
    border-radius: 12px;
}

button:hover{
    background:#c1121f;
}

.logo-usuario{
    text-align:center;
    margin-bottom:20px;
    font-size: 62px;
}



@media(max-width:768px){
    .formularios{
        flex-direction:column;
    }
}
</style>
</head>
<body>

<div class="contenedor">

    <div class="tabs">
        <div class="tab activo">ACCEDER</div>
        <div class="tab">REGISTRARSE</div>
    </div>

    <div class="formularios">

        <!-- LOGIN -->
        <div class="formulario">

            <div class="logo-usuario">
                <i class="bi bi-person-fill "></i>
            </div>

            <h2>Iniciar Sesión</h2>

            <label>Correo electrónico</label>
            <input type="email" placeholder="Ingresa tu correo">

            <label>Contraseña</label>
            <input type="password" placeholder="Ingresa tu contraseña">

            <a href="index.html"><button>ACCEDER</button></a>

        </div>

        <!-- REGISTRO -->
        <div class="formulario">

            <div class="logo-usuario">
                <i class="bi bi-person-plus-fill icono-cuenta"></i>
            </div>
            <h2>Crear Cuenta</h2>
            

            <label>Nombres</label>
            <input type="text" placeholder="Ingresa tus nombres">

            <label>Apellidos</label>
            <input type="text" placeholder="Ingresa tus apellidos">

            <label>Correo electrónico</label>
            <input type="email" placeholder="Ingresa tu correo">

            <label>Contraseña</label>
            <input type="password" placeholder="Crea una contraseña">

            <label>Confirmar contraseña</label>
            <input type="password" placeholder="Repite la contraseña">

            <a href="#"><button>REGISTRARSE</button></a>

        </div>

    </div>

</div>

</body>
</html>
